<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Imyr — rrjet promovimi për biznese</title>
<style>
  :root { --bg:#0e1116; --card:#161b22; --line:#2a313c; --txt:#e6edf3; --mut:#8b949e; --acc:#d4a24e; --good:#3fb950; --err:#f85149; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:16px/1.6 system-ui,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:440px; margin:0 auto; padding:40px 20px 80px; }
  .brand { text-align:center; margin-bottom:6px; }
  .brand h1 { font-size:32px; margin:0; letter-spacing:.08em; color:var(--acc); font-weight:700; }
  .brand p { color:var(--mut); margin:4px 0 28px; font-size:14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px; }
  .tabs { display:flex; gap:8px; margin-bottom:18px; }
  .tab { flex:1; text-align:center; padding:8px; border-radius:8px; cursor:pointer; color:var(--mut); font-size:14px; border:1px solid transparent; }
  .tab.active { background:#0e1116; color:var(--txt); border-color:var(--line); }
  label { display:block; font-size:13px; color:var(--mut); margin:12px 0 4px; }
  input, select { width:100%; padding:10px 12px; background:#0e1116; border:1px solid var(--line); border-radius:8px; color:var(--txt); font-size:14px; }
  button.primary { width:100%; margin-top:18px; padding:11px; background:var(--acc); color:#1a1205; border:none; border-radius:9px; font-weight:600; font-size:15px; cursor:pointer; }
  button.primary:disabled { opacity:.5; }
  .msg { margin-top:12px; font-size:13px; min-height:18px; }
  .msg.err { color:var(--err); } .msg.ok { color:var(--good); }
  .hide { display:none; }
  .panel h2 { font-size:18px; margin:0 0 4px; }
  .row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #20262f; font-size:14px; }
  .row .k { color:var(--mut); } .row .v { color:var(--txt); }
  .celes { font-family:monospace; font-size:12px; color:var(--acc); word-break:break-all; }
  button.link { background:none; border:none; color:var(--mut); cursor:pointer; font-size:13px; text-decoration:underline; margin-top:16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <h1>IMYR</h1>
    <p>Rrjeti ku bizneset promovojnë njëri-tjetrin</p>
  </div>

  <!-- AUTH -->
  <div class="card" id="authCard">
    <div class="tabs">
      <div class="tab active" id="tabHyr" onclick="shfaq('hyr')">Hyr</div>
      <div class="tab" id="tabReg" onclick="shfaq('reg')">Regjistrohu</div>
    </div>

    <!-- HYRJE -->
    <div id="formHyr">
      <label>Email</label>
      <input id="h_email" type="email" placeholder="email@biznesi.com">
      <label>Fjalëkalimi</label>
      <input id="h_pass" type="password" placeholder="••••••">
      <button class="primary" id="btnHyr" onclick="hyr()">Hyr</button>
    </div>

    <!-- REGJISTRIM -->
    <div id="formReg" class="hide">
      <label>Emri i biznesit</label>
      <input id="r_emri" placeholder="Biznesi im">
      <label>Email</label>
      <input id="r_email" type="email" placeholder="email@biznesi.com">
      <label>Fjalëkalimi (min 6 shkronja)</label>
      <input id="r_pass" type="password" placeholder="••••••">
      <label>Kategoria</label>
      <input id="r_kat" placeholder="p.sh. mjete marketingu, e-commerce...">
      <label>Faqja (website)</label>
      <input id="r_web" placeholder="https://biznesi.com">
      <button class="primary" id="btnReg" onclick="regjistrohu()">Krijo llogari</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <!-- PANELI (pas login) -->
  <div class="card panel hide" id="panel">
    <h2 id="p_emri"></h2>
    <div class="row"><span class="k">Email</span><span class="v" id="p_email"></span></div>
    <div class="row"><span class="k">Kategoria</span><span class="v" id="p_kat"></span></div>
    <div class="row"><span class="k">Plani</span><span class="v" id="p_plan"></span></div>
    <div class="row"><span class="k">Faqja</span><span class="v" id="p_web"></span></div>
    <div style="margin-top:14px;">
      <div class="k" style="color:var(--mut);font-size:13px;">Çelësi yt (për snippet-in, së shpejti):</div>
      <div class="celes" id="p_celes"></div>
    </div>
    <button class="link" onclick="dil()">Dil</button>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  function shfaq(k) {
    $('formHyr').classList.toggle('hide', k!=='hyr');
    $('formReg').classList.toggle('hide', k!=='reg');
    $('tabHyr').classList.toggle('active', k==='hyr');
    $('tabReg').classList.toggle('active', k==='reg');
    $('msg').textContent='';
  }
  function msg(t, ok) { const m=$('msg'); m.textContent=t; m.className='msg '+(ok?'ok':'err'); }

  async function regjistrohu() {
    $('btnReg').disabled=true;
    try {
      const body = {
        emri: $('r_emri').value.trim(), email: $('r_email').value.trim(),
        fjalekalimi: $('r_pass').value, kategoria: $('r_kat').value.trim(), website: $('r_web').value.trim()
      };
      const r = await (await fetch('/api/regjistrohu',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
      if (r.error) { msg(r.error); $('btnReg').disabled=false; return; }
      ngarkoPanel();
    } catch(e){ msg('Gabim: '+e.message); $('btnReg').disabled=false; }
  }

  async function hyr() {
    $('btnHyr').disabled=true;
    try {
      const body = { email: $('h_email').value.trim(), fjalekalimi: $('h_pass').value };
      const r = await (await fetch('/api/hyr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
      if (r.error) { msg(r.error); $('btnHyr').disabled=false; return; }
      ngarkoPanel();
    } catch(e){ msg('Gabim: '+e.message); $('btnHyr').disabled=false; }
  }

  async function dil() {
    await fetch('/api/dil',{method:'POST'});
    location.reload();
  }

  async function ngarkoPanel() {
    try {
      const r = await fetch('/api/une');
      if (!r.ok) return; // s'eshte i loguar
      const u = await r.json();
      $('p_emri').textContent = u.emri;
      $('p_email').textContent = u.email;
      $('p_kat').textContent = u.kategoria || '—';
      $('p_plan').textContent = u.plani;
      $('p_web').textContent = u.website || '—';
      $('p_celes').textContent = u.celes;
      $('authCard').classList.add('hide');
      $('panel').classList.remove('hide');
    } catch(e){}
  }

  // provo te ngarkosh panelin (nese je i loguar tashme)
  ngarkoPanel();
</script>
</body>
</html>
