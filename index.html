<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Imyr — rrjet promovimi për biznese</title>
<style>
  :root { --bg:#0e1116; --card:#161b22; --line:#2a313c; --txt:#e6edf3; --mut:#8b949e; --acc:#d4a24e; --good:#3fb950; --err:#f85149; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:16px/1.6 system-ui,Segoe UI,Roboto,sans-serif; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(14,17,22,.9); backdrop-filter:blur(6px); z-index:20; }
  .topbar .side { flex:1; display:flex; align-items:center; gap:8px; }
  .topbar .side.right { justify-content:flex-end; }
  .topbar .logo { font-weight:700; letter-spacing:.1em; color:var(--acc); font-size:18px; flex:0 0 auto; }
  .btn { padding:8px 14px; border-radius:8px; font-size:14px; cursor:pointer; border:1px solid var(--line); background:transparent; color:var(--txt); }
  .btn.cta { background:var(--acc); color:#1a1205; border-color:var(--acc); font-weight:600; }
  .btn.ghost { color:var(--mut); }
  .btn:disabled { opacity:.5; }

  .wrap { max-width:560px; margin:0 auto; padding:40px 20px 80px; }
  .wrap.wide { max-width:680px; }
  .view { display:none; } .view.on { display:block; }

  .hero { text-align:center; }
  .hero h1 { font-size:40px; margin:0; letter-spacing:.08em; color:var(--acc); }
  .hero p { color:var(--mut); margin:10px 0 26px; font-size:16px; }

  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px; }
  label { display:block; font-size:13px; color:var(--mut); margin:12px 0 4px; }
  input, textarea, select { width:100%; padding:10px 12px; background:#0e1116; border:1px solid var(--line); border-radius:8px; color:var(--txt); font-size:14px; font-family:inherit; }
  textarea { resize:vertical; min-height:80px; }
  button.primary { width:100%; margin-top:18px; padding:11px; background:var(--acc); color:#1a1205; border:none; border-radius:9px; font-weight:600; font-size:15px; cursor:pointer; }
  button.primary:disabled { opacity:.5; }
  .msg { margin-top:12px; font-size:13px; min-height:18px; }
  .msg.err { color:var(--err); } .msg.ok { color:var(--good); }
  .hide { display:none !important; }
  .small { font-size:13px; color:var(--mut); }
  .rowbtn { display:flex; gap:8px; margin-top:10px; }
  .rowbtn .btn { flex:1; text-align:center; }

  /* MODAL */
  .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; padding:20px; z-index:40; }
  .modal { width:100%; max-width:420px; }
  .modal .x { float:right; background:none; border:none; color:var(--mut); font-size:20px; cursor:pointer; }
  .tabs { display:flex; gap:8px; margin:6px 0 18px; }
  .tab { flex:1; text-align:center; padding:8px; border-radius:8px; cursor:pointer; color:var(--mut); font-size:14px; border:1px solid transparent; }
  .tab.active { background:#0e1116; color:var(--txt); border-color:var(--line); }

  /* HORIZONTAL STEPPER */
  .hstep { display:flex; justify-content:space-between; margin:6px auto 26px; }
  .hstep .st { flex:1; text-align:center; position:relative; }
  .hstep .st .dot { width:30px; height:30px; border-radius:50%; background:var(--card); border:2px solid var(--line); color:var(--mut); display:flex; align-items:center; justify-content:center; margin:0 auto 6px; font-size:13px; font-weight:600; position:relative; z-index:2; }
  .hstep .st.done .dot { background:var(--acc); border-color:var(--acc); color:#1a1205; }
  .hstep .st.cur .dot { border-color:var(--acc); color:var(--acc); }
  .hstep .st .lbl { font-size:12px; color:var(--mut); }
  .hstep .st.done .lbl, .hstep .st.cur .lbl { color:var(--txt); }
  .hstep .st:not(:last-child)::after { content:''; position:absolute; top:15px; left:50%; width:100%; height:2px; background:var(--line); z-index:1; }
  .hstep .st.done:not(:last-child)::after { background:var(--acc); }

  /* VERTICAL STEPPER (dashboard) */
  .dashttl { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--mut); margin:0 0 6px; }
  .vstep { display:flex; flex-direction:column; }
  .vs { display:flex; gap:12px; align-items:center; padding:11px 10px; border-radius:9px; }
  .vs .vd { width:26px; height:26px; border-radius:50%; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:12px; flex:0 0 auto; color:var(--mut); }
  .vs.done .vd { background:var(--acc); border-color:var(--acc); color:#1a1205; }
  .vs.cur .vd { border-color:var(--acc); color:var(--acc); }
  .vs .vl { font-size:14px; }
  .vs.locked { opacity:.45; }
  .vs.click { cursor:pointer; }
  .vs.click:hover { background:#0e1116; }
  .vs.locked .vl { color:var(--mut); }

  .status { margin-top:12px; padding:12px 14px; border-radius:10px; border:1px solid var(--line); background:#0e1116; font-size:14px; color:var(--mut); }
  .status.wait { border-color:#4a3d1e; color:var(--acc); }
  .kod { width:100%; min-height:60px; font-family:monospace; font-size:12.5px; background:#0e1116; border:1px solid var(--line); border-radius:8px; color:var(--acc); padding:12px; resize:vertical; }
  .chk { display:flex; gap:10px; align-items:flex-start; margin-top:12px; font-size:13px; cursor:pointer; }
  .chk input { width:auto; margin-top:3px; }
  .tag { display:inline-block; background:#1a1205; color:var(--acc); border:1px solid #4a3d1e; border-radius:6px; padding:3px 9px; font-size:12px; margin:3px 4px 0 0; }
  .spin { display:inline-block; width:15px; height:15px; border:2px solid var(--line); border-top-color:var(--acc); border-radius:50%; animation:sp .8s linear infinite; vertical-align:middle; }
  @keyframes sp { to { transform:rotate(360deg); } }
  .row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid #20262f; font-size:14px; }
  .row .k { color:var(--mut); }
  .celes { font-family:monospace; font-size:12px; color:var(--acc); word-break:break-all; }
  h2.h { font-size:20px; margin:0 0 4px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="side left" id="hdrLeft"></div>
  <div class="logo">IMYR</div>
  <div class="side right" id="hdrRight">
    <button class="btn" onclick="hapModal('hyr')">Log in</button>
    <button class="btn cta" onclick="startWizard()">Try for free</button>
  </div>
</header>

<!-- HERO -->
<div class="wrap view on" id="v-hero">
  <div class="hero">
    <h1>IMYR</h1>
    <p>Rrjeti ku bizneset promovojnë njëri-tjetrin</p>
    <button class="btn cta" onclick="startWizard()">Provo falas</button>
  </div>
</div>

<!-- WIZARD (full-screen) -->
<div class="wrap wide view" id="v-wizard">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <div class="small" id="wizStepN"></div>
    <button class="btn ghost" onclick="closeWizard()">Ruaj &amp; dil ✕</button>
  </div>
  <div class="hstep" id="hstep"></div>
  <div class="card" id="wizBody"></div>
</div>

<!-- PROFILE -->
<div class="wrap view" id="v-profile">
  <div class="card" style="margin-bottom:16px;">
    <h2 class="h" id="p_emri"></h2>
    <div class="row"><span class="k">Email</span><span id="p_email"></span></div>
    <div class="row"><span class="k">Kategoria</span><span id="p_kat"></span></div>
    <div class="row"><span class="k">Plani</span><span id="p_plan"></span></div>
    <div style="margin-top:12px;">
      <div class="small">Përmbledhja (për algoritmin):</div>
      <div id="p_perm" style="font-size:14px;"></div>
    </div>
  </div>
  <div class="card">
    <p class="dashttl">Dashboard — hapat e konfigurimit</p>
    <div class="vstep" id="vstep"></div>
  </div>
</div>

<!-- LOGIN MODAL -->
<div class="backdrop hide" id="modal">
  <div class="card modal">
    <button class="x" onclick="mbyllModal()">✕</button>
    <div class="tabs">
      <div class="tab active" id="tabHyr" onclick="shfaq('hyr')">Hyr</div>
      <div class="tab" id="tabReg" onclick="shfaq('reg')">Regjistrohu</div>
    </div>
    <div id="formHyr">
      <label>Email</label><input id="h_email" type="email" placeholder="email@biznesi.com">
      <label>Fjalëkalimi</label><input id="h_pass" type="password" placeholder="••••••">
      <button class="primary" id="btnHyr" onclick="hyr()">Hyr</button>
    </div>
    <div id="formReg" class="hide">
      <label>Emri i biznesit</label><input id="r_emri" placeholder="Biznesi im">
      <label>Email</label><input id="r_email" type="email" placeholder="email@biznesi.com">
      <label>Fjalëkalimi (min 6)</label><input id="r_pass" type="password" placeholder="••••••">
      <label>Faqja (website)</label><input id="r_web" placeholder="https://biznesi.com">
      <button class="primary" id="btnReg" onclick="regjistrohu()">Krijo llogari</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  let pollTimer = null, prog = null, une = null, curStep = 0;
  const STEPS = [
    { key:'llogaria',   label:'Llogaria' },
    { key:'pershkrimi', label:'Përshkrimi' },
    { key:'lidhja',     label:'Lidhja' },
    { key:'reklama',    label:'Reklama' }
  ];

  function showView(v){ ['hero','wizard','profile'].forEach(x=>$('v-'+x).classList.toggle('on', x===v)); }

  // ---------- LOGIN MODAL ----------
  function hapModal(k){ $('modal').classList.remove('hide'); shfaq(k); }
  function mbyllModal(){ $('modal').classList.add('hide'); $('msg').textContent=''; }
  $('modal').addEventListener('click', e=>{ if(e.target.id==='modal') mbyllModal(); });
  function shfaq(k){
    $('formHyr').classList.toggle('hide', k!=='hyr');
    $('formReg').classList.toggle('hide', k!=='reg');
    $('tabHyr').classList.toggle('active', k==='hyr');
    $('tabReg').classList.toggle('active', k==='reg');
    $('msg').textContent='';
  }
  function msg(t,ok){ const m=$('msg'); m.textContent=t; m.className='msg '+(ok?'ok':'err'); }

  async function hyr(){
    $('btnHyr').disabled=true;
    try{
      const r=await(await fetch('/api/hyr',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:$('h_email').value.trim(),fjalekalimi:$('h_pass').value})})).json();
      if(r.error){ msg(r.error); $('btnHyr').disabled=false; return; }
      mbyllModal(); await boot();
    }catch(e){ msg('Gabim: '+e.message); }
    $('btnHyr').disabled=false;
  }
  async function regjistrohu(){
    $('btnReg').disabled=true;
    try{
      const body={emri:$('r_emri').value.trim(),email:$('r_email').value.trim(),fjalekalimi:$('r_pass').value,website:$('r_web').value.trim()};
      const r=await(await fetch('/api/regjistrohu',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
      if(r.error){ msg(r.error); $('btnReg').disabled=false; return; }
      mbyllModal(); await boot(); openWizard(nextIncomplete());
    }catch(e){ msg('Gabim: '+e.message); }
    $('btnReg').disabled=false;
  }
  async function dil(){ await fetch('/api/dil',{method:'POST'}); location.reload(); }

  // ---------- PROGRESI ----------
  async function refreshProg(){ try{ prog = await(await fetch('/api/progres')).json(); }catch(e){ prog={llogaria:true,pershkrimi:false,lidhja:false,reklama:false}; } }
  function nextIncomplete(){ for(let i=0;i<STEPS.length;i++){ if(!prog[STEPS[i].key]) return i; } return STEPS.length; }

  // ---------- BOOT ----------
  async function boot(){
    let r; try{ r=await fetch('/api/une'); }catch(e){ showView('hero'); return; }
    if(!r.ok){ showView('hero'); return; }
    une = await r.json();
    await refreshProg();
    $('hdrRight').innerHTML='';
    $('hdrLeft').innerHTML='<button class="btn ghost" onclick="dil()">Log out</button>';
    renderProfile();
    showView('profile');
  }

  function renderProfile(){
    $('p_emri').textContent = une.emri;
    $('p_email').textContent = une.email;
    $('p_kat').textContent = une.kategoria_kryesore || une.kategoria || '—';
    $('p_plan').textContent = une.plani || 'falas';
    $('p_perm').textContent = une.permbledhje || '—';
    renderVStep();
  }

  function renderVStep(){
    const nx = nextIncomplete();
    const el = $('vstep'); el.innerHTML='';
    STEPS.forEach((s,i)=>{
      const done = prog[s.key];
      const isCur = (i===nx);
      const locked = (i>nx);
      const clickable = done || isCur;
      const d = document.createElement('div');
      d.className = 'vs' + (done?' done':'') + (isCur?' cur':'') + (locked?' locked':'') + (clickable?' click':'');
      d.innerHTML = '<span class="vd">'+(done?'✓':(i+1))+'</span><span class="vl">'+s.label+
        (isCur?' — vazhdo':'')+(locked?' — i kyçur':'')+'</span>';
      if(clickable) d.onclick = ()=>openWizard(i);
      el.appendChild(d);
    });
  }

  // ---------- WIZARD ----------
  function startWizard(){ if(une){ openWizard(nextIncomplete()); } else { openWizard(0); } }
  function closeWizard(){ if(pollTimer){clearInterval(pollTimer);pollTimer=null;} if(une){ boot(); } else { showView('hero'); } }

  function openWizard(i){
    if(i>=STEPS.length) i=STEPS.length-1;
    curStep=i; showView('wizard'); renderHStep(); renderStepBody(i);
  }
  function renderHStep(){
    const nx = une ? nextIncomplete() : 0;
    $('wizStepN').textContent = 'Hapi '+(curStep+1)+' nga '+STEPS.length;
    const el=$('hstep'); el.innerHTML='';
    STEPS.forEach((s,i)=>{
      const done = une && prog[s.key];
      const cur = (i===curStep);
      const d=document.createElement('div');
      d.className='st'+(done?' done':'')+(cur?' cur':'');
      d.innerHTML='<div class="dot">'+(done?'✓':(i+1))+'</div><div class="lbl">'+s.label+'</div>';
      el.appendChild(d);
    });
  }

  async function advance(){
    await refreshProg(); renderHStep();
    const nx = nextIncomplete();
    if(nx>=STEPS.length){ closeWizard(); return; }
    openWizard(nx);
  }

  function renderStepBody(i){
    const b=$('wizBody');
    if(i===0) return stepLlogaria(b);
    if(i===1) return stepPershkrimi(b);
    if(i===2) return stepLidhja(b);
    if(i===3) return stepReklama(b);
  }

  // STEP 0 — Llogaria
  function stepLlogaria(b){
    if(une){
      b.innerHTML='<h2 class="h">Llogaria ✓</h2><p class="small">Llogaria u krijua për <b>'+une.emri+'</b>.</p>'+
        '<button class="primary" onclick="openWizard(1)">Vazhdo →</button>';
      return;
    }
    b.innerHTML=
      '<h2 class="h">Krijo llogarinë</h2><p class="small">Fillo me të dhënat bazë.</p>'+
      '<label>Emri i biznesit</label><input id="a_emri" placeholder="Biznesi im">'+
      '<label>Email</label><input id="a_email" type="email" placeholder="email@biznesi.com">'+
      '<label>Fjalëkalimi (min 6)</label><input id="a_pass" type="password" placeholder="••••••">'+
      '<label>Faqja / linku i SaaS-it</label><input id="a_web" placeholder="https://saasi-im.com">'+
      '<button class="primary" id="a_btn" onclick="wizKrijo()">Vazhdo →</button><div class="msg" id="a_msg"></div>';
  }
  async function wizKrijo(){
    const emri=$('a_emri').value.trim(),email=$('a_email').value.trim(),pass=$('a_pass').value,web=$('a_web').value.trim();
    if(!emri||!email||!pass){ $('a_msg').className='msg err'; $('a_msg').textContent='Plotëso emrin, email-in dhe fjalëkalimin.'; return; }
    if(pass.length<6){ $('a_msg').className='msg err'; $('a_msg').textContent='Fjalëkalimi min 6 shkronja.'; return; }
    $('a_btn').disabled=true;
    try{
      const r=await(await fetch('/api/regjistrohu',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({emri,email,fjalekalimi:pass,website:web})})).json();
      if(r.error){ $('a_msg').className='msg err'; $('a_msg').textContent=r.error; $('a_btn').disabled=false; return; }
      une=await(await fetch('/api/une')).json();
      $('hdrRight').innerHTML=''; $('hdrLeft').innerHTML='<button class="btn ghost" onclick="dil()">Log out</button>';
      await advance();
    }catch(e){ $('a_msg').className='msg err'; $('a_msg').textContent='Gabim: '+e.message; $('a_btn').disabled=false; }
  }

  // STEP 1 — Përshkrimi + AI (i editueshëm)
  function stepPershkrimi(b){
    b.innerHTML=
      '<h2 class="h">Përshkruaj biznesin</h2><p class="small">AI e kupton dhe cakton kategorinë; ti mund ta korrigjosh pastaj.</p>'+
      '<label>Çfarë ofron biznesi yt?</label>'+
      '<textarea id="d_persh" placeholder="p.sh. Mjet email-marketing për dyqane të vogla online...">'+(une.pershkrimi||'')+'</textarea>'+
      '<label class="chk"><input type="checkbox" id="d_lejo" checked><span>Lejo që linku i SaaS-it të studiohet automatikisht për saktësi më të madhe.</span></label>'+
      '<button class="primary" id="d_btn" onclick="wizAnalizo()">Analizo me AI →</button>'+
      '<div class="msg" id="d_msg"></div>'+
      '<div id="d_res" class="hide" style="margin-top:16px;"></div>';
    if(une.permbledhje){ mbushRezultat(une.kategoria_kryesore, une.nenkategorite, une.permbledhje); }
  }
  function mbushRezultat(kk,nk,perm){
    $('d_res').classList.remove('hide');
    $('d_res').innerHTML=
      '<div class="small" style="margin-bottom:6px;color:var(--acc)">Rezultati (i editueshëm):</div>'+
      '<label>Kategoria kryesore</label><input id="e_kk" value="'+(kk||'').replace(/"/g,"&quot;")+'">'+
      '<label>Nënkategoritë (ndaji me presje)</label><input id="e_nk" value="'+(nk||'').replace(/"/g,"&quot;")+'">'+
      '<label>Përmbledhja</label><textarea id="e_perm">'+(perm||'')+'</textarea>'+
      '<div class="rowbtn"><button class="btn" id="e_save" onclick="ruajPermbledhje()">Ruaj ndryshimet</button>'+
      '<button class="btn cta" onclick="openWizard(2)">Vazhdo →</button></div>'+
      '<div class="msg" id="e_msg"></div>';
  }
  async function wizAnalizo(){
    const pershkrimi=$('d_persh').value.trim(), lejo=$('d_lejo').checked;
    if(!pershkrimi){ $('d_msg').className='msg err'; $('d_msg').textContent='Shkruaj një përshkrim.'; return; }
    $('d_btn').disabled=true; $('d_msg').className='msg'; $('d_msg').innerHTML='<span class="spin"></span> Imyr po studion biznesin…';
    try{
      const r=await(await fetch('/api/analizo',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({pershkrimi,lejo})})).json();
      $('d_msg').textContent='';
      if(r.ai){ mbushRezultat(r.kategoria_kryesore, r.nenkategorite, r.permbledhje); }
      else { mbushRezultat('', '', pershkrimi); $('d_msg').className='msg'; $('d_msg').textContent = r.note||''; }
      une.pershkrimi=pershkrimi;
    }catch(e){ $('d_msg').className='msg err'; $('d_msg').textContent='Gabim: '+e.message; }
    $('d_btn').disabled=false;
  }
  async function ruajPermbledhje(){
    $('e_save').disabled=true;
    try{
      const body={kategoria_kryesore:$('e_kk').value.trim(),nenkategorite:$('e_nk').value.trim(),permbledhje:$('e_perm').value.trim()};
      const r=await(await fetch('/api/permbledhje',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json();
      if(r.error){ $('e_msg').className='msg err'; $('e_msg').textContent=r.error; }
      else { $('e_msg').className='msg ok'; $('e_msg').textContent='U ruajt ✓'; une.kategoria_kryesore=body.kategoria_kryesore; une.nenkategorite=body.nenkategorite; une.permbledhje=body.permbledhje; }
    }catch(e){ $('e_msg').className='msg err'; $('e_msg').textContent='Gabim: '+e.message; }
    $('e_save').disabled=false;
  }

  // STEP 2 — Lidhja (snippet një-rresht)
  function snippetKod(){ return '<script src="'+location.origin+'/imyr.js" data-key="'+(une.celes||'')+'"></'+'script>'; }
  function stepLidhja(b){
    b.innerHTML=
      '<h2 class="h">Lidh Imyr-in te faqja jote</h2>'+
      '<p class="small">Kopjo këtë rresht dhe vendose kudo te faqja jote (p.sh. te footer-i).</p>'+
      '<textarea class="kod" id="kodBox" readonly>'+snippetKod().replace(/</g,'&lt;')+'</textarea>'+
      '<div class="rowbtn"><button class="btn cta" id="cbtn" onclick="kopjo()">Kopjo</button></div>'+
      '<div id="afterCopy" class="hide">'+
        '<div class="small" style="margin-top:12px;">Pasi ta ruash te faqja jote, shkruaj URL-në ku e vendose dhe hape për të konfirmuar lidhjen.</div>'+
        '<label>URL-ja e faqes</label><input id="hapUrl" value="'+((une.website||'')).replace(/"/g,"&quot;")+'" placeholder="https://faqja-ime.com">'+
        '<button class="primary" id="hbtn" onclick="hapDheVerifiko()">Hap faqen dhe konfirmo →</button>'+
        '<div class="status wait hide" id="statusLine"></div>'+
      '</div>';
    if(prog.lidhja){
      $('afterCopy').classList.remove('hide');
      $('statusLine').classList.remove('hide'); $('statusLine').textContent='✓ E lidhur.';
    }
  }
  function kopjo(){
    const t=$('kodBox'); t.select(); t.setSelectionRange(0,99999);
    try{document.execCommand('copy');}catch(e){}
    $('cbtn').textContent='U kopjua ✓'; setTimeout(()=>$('cbtn').textContent='Kopjo',1500);
    $('afterCopy').classList.remove('hide');
  }
  function hapDheVerifiko(){
    let url=($('hapUrl').value||'').trim(); if(!url){ $('hapUrl').focus(); return; }
    if(!/^https?:\/\//i.test(url)) url='https://'+url;
    window.open(url,'_blank');
    $('statusLine').classList.remove('hide'); $('statusLine').innerHTML='⏳ Po pres sinjalin e lidhjes…';
    startPolling();
  }
  function startPolling(){
    if(pollTimer) clearInterval(pollTimer);
    const tick=async()=>{ try{ const st=await(await fetch('/api/kontrollo')).json();
      if(st.active){ clearInterval(pollTimer); pollTimer=null; $('statusLine').className='status'; $('statusLine').innerHTML='✓ U lidh me sukses!';
        await refreshProg(); renderHStep(); setTimeout(()=>openWizard(3),900); } }catch(e){} };
    tick(); pollTimer=setInterval(tick,6000);
  }

  // STEP 3 — Reklama (tekst tani; video/ngarkim më vonë)
  function stepReklama(b){
    b.innerHTML=
      '<h2 class="h">Krijo reklamën</h2>'+
      '<p class="small">Për tani, një reklamë me tekst. Së shpejti: ngarkim imazhi/videoje dhe gjenerim me AI.</p>'+
      '<label>Teksti i reklamës që do të shfaqet te të tjerët</label>'+
      '<textarea id="ad_txt" placeholder="p.sh. Provo mjetin tonë falas për 14 ditë!"></textarea>'+
      '<button class="primary" id="ad_btn" onclick="ruajReklame()">Ruaj reklamën →</button>'+
      '<div class="msg" id="ad_msg"></div>';
  }
  async function ruajReklame(){
    const t=$('ad_txt').value.trim(); if(!t){ $('ad_msg').className='msg err'; $('ad_msg').textContent='Shkruaj tekstin.'; return; }
    $('ad_btn').disabled=true;
    try{
      const r=await(await fetch('/api/promovimi',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({teksti:t})})).json();
      if(r.error){ $('ad_msg').className='msg err'; $('ad_msg').textContent=r.error; $('ad_btn').disabled=false; return; }
      $('ad_msg').className='msg ok'; $('ad_msg').textContent='U ruajt ✓';
      await refreshProg(); renderHStep(); setTimeout(closeWizard,900);
    }catch(e){ $('ad_msg').className='msg err'; $('ad_msg').textContent='Gabim: '+e.message; $('ad_btn').disabled=false; }
  }

  boot();
</script>
</body>
</html>
